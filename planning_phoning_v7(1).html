<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Planning Phoning – Linxea</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f8fafc;font-family:'Inter',sans-serif;color:#1e293b}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
.btn{cursor:pointer;border:none;font-family:inherit;font-size:12px;font-weight:500;transition:filter .12s,transform .1s}
.btn:hover{filter:brightness(.92)}.btn:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:12px;color:#334155;background:white;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;outline:none}
input:focus,select:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.12)}
.slot-o{position:absolute;padding:0 2px}
.slot-i{height:100%;border-radius:7px;padding:5px 8px 4px;overflow:hidden;cursor:pointer;transition:box-shadow .12s;border-left:3px solid transparent;position:relative}
.slot-i:hover{box-shadow:0 2px 14px rgba(0,0,0,.13);filter:brightness(.95)}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:400;backdrop-filter:blur(2px)}
.mb{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:401;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(15,23,42,.22)}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap}
.tgr{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.tgo{background:#fefce8;color:#b45309;border:1px solid #fde68a}
.lbl{font-size:10px;font-weight:600;color:#64748b;margin-bottom:3px}
.fc{display:flex;flex-direction:column;gap:3px}
.sf{background:#f0f4ff;border:1px solid #c7d2fe;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:white;padding:10px 18px;border-radius:9px;font-size:12px;font-weight:500;z-index:600;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:fup .2s ease;pointer-events:none;max-width:90vw;text-align:center}
@keyframes fup{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.scard{background:white;border:1px solid #e2e8f0;border-radius:16px;padding:32px;width:min(520px,96vw);box-shadow:0 4px 24px rgba(0,0,0,.07)}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ══ DONNÉES PAR DÉFAUT ═════════════════════════════════════════════════════════
const DEF_MEMBERS=[
  {name:'Delphine',color:'#6366f1',canOpport:true, email:''},
  {name:'Chloé',   color:'#ec4899',canOpport:true, email:''},
  {name:'Hadrien', color:'#10b981',canOpport:false,email:''},
  {name:'Clémence',color:'#f97316',canOpport:true, email:''},
  {name:'Sophie',  color:'#0ea5e9',canOpport:true, email:''},
  {name:'Alexia',  color:'#8b5cf6',canOpport:true, email:''},
  {name:'Florent', color:'#22c55e',canOpport:true, email:''},
  {name:'Brice',   color:'#eab308',canOpport:true, email:''},
  {name:'Romain',  color:'#ef4444',canOpport:false,email:''},
];
// startH/endH en heures décimales : 9=9h00, 9.333=9h20, 9.667=9h40
const DEF_SCHED=[
  {id:'s01',day:0,person:'Delphine',startH:9, endH:13,type:'rappel',display:'',note:''},
  {id:'s02',day:0,person:'Chloé',   startH:13,endH:18,type:'rappel',display:'',note:''},
  {id:'s03',day:1,person:'Sophie',  startH:9, endH:13,type:'rappel',display:'',note:''},
  {id:'s04',day:1,person:'Brice',   startH:10,endH:15,type:'opport',display:'10h–12h / 14h–15h',note:''},
  {id:'s05',day:1,person:'Chloé',   startH:13,endH:18,type:'rappel',display:'',note:''},
  {id:'s06',day:1,person:'Clémence',startH:14,endH:18,type:'rappel',display:'',note:'Calendly 2ème'},
  {id:'s07',day:1,person:'Alexia',  startH:15,endH:18,type:'opport',display:'',note:''},
  {id:'s08',day:2,person:'Hadrien', startH:9, endH:13,type:'rappel',display:'',note:''},
  {id:'s09',day:2,person:'Chloé',   startH:10,endH:15,type:'opport',display:'10h–12h / 14h–15h',note:''},
  {id:'s10',day:2,person:'Clémence',startH:13,endH:18,type:'rappel',display:'',note:'Calendly 1'},
  {id:'s11',day:2,person:'Romain',  startH:14,endH:18,type:'rappel',display:'',note:'Calendly 2ème'},
  {id:'s12',day:2,person:'Sophie',  startH:15,endH:18,type:'opport',display:'',note:''},
  {id:'s13',day:3,person:'Florent', startH:9, endH:13,type:'rappel',display:'',note:''},
  {id:'s14',day:3,person:'Delphine',startH:10,endH:15,type:'opport',display:'10h–12h / 14h–15h',note:''},
  {id:'s15',day:3,person:'Alexia',  startH:13,endH:18,type:'rappel',display:'',note:''},
  {id:'s16',day:3,person:'Romain',  startH:14,endH:18,type:'rappel',display:'',note:'Calendly 2ème'},
  {id:'s17',day:3,person:'Clémence',startH:15,endH:18,type:'opport',display:'',note:''},
  {id:'s18',day:4,person:'Sophie',  startH:9, endH:13,type:'rappel',display:'',note:''},
  {id:'s19',day:4,person:'Florent', startH:10,endH:12,type:'opport',display:'',note:''},
  {id:'s20',day:4,person:'Brice',   startH:13,endH:17,type:'rappel',display:'',note:''},
  {id:'s21',day:4,person:'Romain',  startH:14,endH:18,type:'rappel',display:'',note:'Calendly 2ème'},
];

const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MSH=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const H0=8, H1=19, HPX=62;
// Créneaux de 20 min : 8h00 → 19h00
const TIME_OPTS=Array.from({length:34},(_,i)=>Math.round((8+i/3)*1000)/1000);
const tFmt=h=>`${Math.floor(h)}h${String(Math.round((h%1)*60)).padStart(2,'0')}`;
const COLORS=['#6366f1','#ec4899','#10b981','#f97316','#0ea5e9','#8b5cf6','#22c55e','#eab308','#ef4444','#14b8a6','#a855f7','#f43f5e'];

// ══ UTILITAIRES ════════════════════════════════════════════════════════════════
const getMon=d=>{const r=new Date(d);r.setHours(0,0,0,0);const w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));return r};
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const isoW=d=>{const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const w=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-w);return Math.ceil(((t-new Date(Date.UTC(t.getUTCFullYear(),0,1)))/864e5+1)/7)};
const fmtS=d=>`${d.getDate()} ${MSH[d.getMonth()]}`;
const uid=()=>Math.random().toString(36).slice(2,8);
const hexA=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`};

function layoutDay(slots){
  if(!slots.length)return[];
  const s=[...slots].sort((a,b)=>a.startH-b.startH||a.endH-b.endH);
  const ce=[];
  const wc=s.map(x=>{let c=0;while(c<ce.length&&ce[c]>x.startH)c++;if(c===ce.length)ce.push(x.endH);else ce[c]=x.endH;return{...x,col:c}});
  const ov=(a,b)=>a.id!==b.id&&a.startH<b.endH&&b.startH<a.endH;
  const gcc=sl=>{const v=new Set(),q=[sl];let m=sl.col;while(q.length){const c=q.shift();if(v.has(c.id))continue;v.add(c.id);m=Math.max(m,c.col);wc.filter(o=>!v.has(o.id)&&ov(c,o)).forEach(o=>q.push(o))}return m+1};
  return wc.map(x=>({...x,top:(x.startH-H0)*HPX,height:Math.max((x.endH-x.startH)*HPX-4,24),leftPct:(x.col/gcc(x))*100,widthPct:(1/gcc(x))*100}));
}

// ══ ICS + TEAMS ════════════════════════════════════════════════════════════════
function makeICS(person,type,startH,endH,date){
  const pad=n=>String(n).padStart(2,'0');
  const dt=(d,h)=>{const r=new Date(d);r.setHours(Math.floor(h),Math.round((h%1)*60),0,0);
    return`${r.getFullYear()}${pad(r.getMonth()+1)}${pad(r.getDate())}T${pad(r.getHours())}${pad(r.getMinutes())}00`};
  const typ=type==='rappel'?'Rappels clients':'Opportunités';
  return['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Planning Phoning Linxea//FR',
    'BEGIN:VEVENT',`UID:ph-${Date.now()}@linxea`,
    `DTSTART:${dt(date,startH)}`,`DTEND:${dt(date,endH)}`,
    `SUMMARY:📞 Remplacement phoning – ${typ}`,
    `DESCRIPTION:Tu remplaces ${person}.\\nHoraire : ${tFmt(startH)}–${tFmt(endH)}`,
    'BEGIN:VALARM','TRIGGER:-PT5M','ACTION:DISPLAY',
    'DESCRIPTION:📞 Phoning dans 5 minutes','END:VALARM',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
}
const dlICS=(ics,name)=>{const a=document.createElement('a');a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);a.download=name+'.ics';a.click()};
const makeTeamsMsg=(rep,person,dayIdx,startH,endH,type,date)=>{
  const typ=type==='rappel'?'Rappels clients':'Opportunités';
  return`@${rep} tu remplaces ${person} le ${DAYS[dayIdx]} ${fmtS(date)} de ${tFmt(startH)} à ${tFmt(endH)} (${typ}). Merci de confirmer ✅`;
};

// ══ JSONBIN ════════════════════════════════════════════════════════════════════
const B='https://api.jsonbin.io/v3/b';
const jRead=async(id,k)=>{const r=await fetch(`${B}/${id}/latest`,{headers:{'X-Master-Key':k}});if(!r.ok)throw new Error(`Erreur ${r.status}`);return(await r.json()).record};
const jWrite=async(id,k,data)=>{const r=await fetch(`${B}/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':k},body:JSON.stringify(data)});if(!r.ok)throw new Error('Sauvegarde échouée')};
const jCreate=async k=>{const r=await fetch(B,{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':k,'X-Bin-Name':'Planning Phoning Linxea'},body:JSON.stringify({members:DEF_MEMBERS,schedule:DEF_SCHED,weekData:{},rotation:{rappel:{},opport:{}}})});if(!r.ok)throw new Error('Création échouée — vérifiez votre clé');return(await r.json()).metadata.id};
const cfg={get:()=>{try{return JSON.parse(localStorage.getItem('ph-cfg')||'{}')}catch{return{}}},set:v=>{try{localStorage.setItem('ph-cfg',JSON.stringify(v))}catch{}}};

// ══ COMPOSANT : Formulaire créneau ═════════════════════════════════════════════
function SlotForm({slot,members,isNew,onSave,onDelete,onCancel}){
  const[f,setF]=useState({id:slot.id||'',day:slot.day??0,person:slot.person||members[0]?.name||'',startH:slot.startH??9,endH:slot.endH??13,type:slot.type||'rappel',display:slot.display||'',note:slot.note||''});
  const u=(k,v)=>setF(p=>({...p,[k]:['startH','endH','day'].includes(k)?Number(v):v}));
  return(
  <div className="sf">
    <div style={{fontSize:'10px',fontWeight:'700',color:'#4f46e5',textTransform:'uppercase',letterSpacing:'.5px'}}>{isNew?'⊕ Nouveau créneau':'✎ Modifier ce créneau'}</div>
    <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
      <div className="fc"><div className="lbl">Collaborateur</div>
        <select value={f.person} onChange={e=>u('person',e.target.value)}>{members.map(m=><option key={m.name}>{m.name}</option>)}</select>
      </div>
      <div className="fc"><div className="lbl">Jour</div>
        <select value={f.day} onChange={e=>u('day',e.target.value)}>{DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}</select>
      </div>
      <div className="fc"><div className="lbl">Début</div>
        <select value={f.startH} onChange={e=>u('startH',e.target.value)}>
          {TIME_OPTS.filter(h=>h<f.endH).map(h=><option key={h} value={h}>{tFmt(h)}</option>)}
        </select>
      </div>
      <div className="fc"><div className="lbl">Fin</div>
        <select value={f.endH} onChange={e=>u('endH',e.target.value)}>
          {TIME_OPTS.filter(h=>h>f.startH).map(h=><option key={h} value={h}>{tFmt(h)}</option>)}
        </select>
      </div>
      <div className="fc"><div className="lbl">Type</div>
        <select value={f.type} onChange={e=>u('type',e.target.value)}>
          <option value="rappel">📞 Rappel</option><option value="opport">⭐ Opport</option>
        </select>
      </div>
    </div>
    <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
      <div className="fc" style={{flex:1,minWidth:'160px'}}>
        <div className="lbl">Affichage personnalisé (optionnel) — ex: "10h–12h / 14h–15h"</div>
        <input type="text" value={f.display} onChange={e=>u('display',e.target.value)} placeholder="Laisser vide = automatique"/>
      </div>
      <div className="fc" style={{flex:1,minWidth:'120px'}}>
        <div className="lbl">Note — ex: Calendly 2ème</div>
        <input type="text" value={f.note} onChange={e=>u('note',e.target.value)} placeholder="Optionnel"/>
      </div>
    </div>
    <div style={{display:'flex',gap:'7px',flexWrap:'wrap'}}>
      <button className="btn" onClick={()=>onSave(f)} style={{padding:'7px 16px',borderRadius:'7px',background:'#4f46e5',color:'white',fontWeight:'600',fontSize:'12px'}}>{isNew?'+ Ajouter':'✓ Valider'}</button>
      {!isNew&&<button className="btn" onClick={()=>{if(window.confirm('Supprimer ce créneau ?'))onDelete()}} style={{padding:'7px 12px',borderRadius:'7px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca',fontSize:'12px'}}>Supprimer</button>}
      <button className="btn" onClick={onCancel} style={{padding:'7px 10px',borderRadius:'7px',background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',fontSize:'12px'}}>Annuler</button>
    </div>
  </div>);
}

// ══ COMPOSANT : Pause ponctuelle 20 min ════════════════════════════════════════
function BreakForm({slot,members,onAdd,onCancel}){
  const opts=TIME_OPTS.filter(t=>t>=slot.startH&&t<slot.endH);
  const[bs,setBs]=useState(opts[0]??slot.startH);
  const[rep,setRep]=useState('');
  const be=Math.round((bs+1/3)*1000)/1000; // +20 min
  return(
  <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:'9px',padding:'12px',display:'flex',flexDirection:'column',gap:'9px'}}>
    <div style={{fontSize:'10px',fontWeight:'700',color:'#ea580c',textTransform:'uppercase',letterSpacing:'.5px'}}>🔔 Ajouter une pause de 20 min</div>
    <div style={{fontSize:'11px',color:'#78350f',lineHeight:'1.6'}}>Choisissez l'heure de début — la fin sera automatiquement fixée à +20 minutes.</div>
    <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'flex-end'}}>
      <div className="fc">
        <div className="lbl">Début</div>
        <select value={bs} onChange={e=>setBs(Number(e.target.value))}>
          {opts.map(t=><option key={t} value={t}>{tFmt(t)}</option>)}
        </select>
      </div>
      <div style={{fontSize:'12px',color:'#94a3b8',paddingBottom:'6px'}}>→ fin à {tFmt(be)}</div>
      <div className="fc">
        <div className="lbl">Remplaçant·e</div>
        <select value={rep} onChange={e=>setRep(e.target.value)}>
          <option value="">— choisir —</option>
          {members.filter(m=>m.name!==slot.person).map(m=><option key={m.name}>{m.name}</option>)}
        </select>
      </div>
      <button className="btn" onClick={()=>{if(!rep)return;onAdd({id:uid(),startH:bs,endH:be,rep})}}
        style={{padding:'7px 14px',borderRadius:'7px',background:'#ea580c',color:'white',fontWeight:'600',fontSize:'12px'}}>✓ Valider</button>
      <button className="btn" onClick={onCancel} style={{padding:'7px 10px',borderRadius:'7px',background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',fontSize:'12px'}}>Annuler</button>
    </div>
  </div>);
}

// ══ COMPOSANT : Wizard première configuration ══════════════════════════════════
function Wizard({onDone}){
  const[step, setStep]=useState('choice');
  const[mkey, setMkey]=useState('');
  const[pin,  setPin] =useState('');
  const[code, setCode]=useState('');
  const[busy, setBusy]=useState(false);
  const[err,  setErr] =useState('');
  const[binId,setBinId]=useState('');

  const goAdmin=async()=>{
    if(mkey.trim().length<10){setErr('Clé trop courte');return}
    if(pin.length<3){setErr('PIN trop court (min 3 caractères)');return}
    setBusy(true);setErr('');
    try{const id=await jCreate(mkey.trim());cfg.set({binId:id,masterKey:mkey.trim(),pin});setBinId(id);setStep('success')}
    catch(e){setErr(e.message)}
    setBusy(false);
  };
  const goReader=async()=>{
    if(!code.trim()){setErr('Entrez le code d\'accès');return}
    setBusy(true);setErr('');
    try{
      const r=await fetch(`${B}/${code.trim()}/latest`,{headers:{'X-Master-Key':''}});
      if(r.ok||r.status===401){cfg.set({binId:code.trim(),masterKey:'',pin:''});onDone()}
      else throw new Error('Code invalide');
    }catch{setErr('Code invalide ou erreur réseau')}
    setBusy(false);
  };

  const Wrap=({children})=>(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#f0f4ff,#f8fafc)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <div className="scard">{children}</div>
    </div>);
  const Num=({n})=>(<div style={{width:'26px',height:'26px',borderRadius:'50%',background:'#6366f1',color:'white',fontSize:'11px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{n}</div>);

  if(step==='choice')return(
    <Wrap>
      <div style={{textAlign:'center',marginBottom:'28px'}}>
        <div style={{fontSize:'40px',marginBottom:'8px'}}>📞</div>
        <div style={{fontSize:'20px',fontWeight:'700',color:'#0f172a'}}>Planning Phoning Linxea</div>
        <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>Première configuration</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        <button className="btn" onClick={()=>setStep('admin')} style={{padding:'16px',borderRadius:'12px',background:'#4f46e5',color:'white',textAlign:'left',display:'flex',alignItems:'center',gap:'12px'}}>
          <div style={{width:'36px',height:'36px',borderRadius:'9px',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}}>⚙️</div>
          <div><div style={{fontWeight:'700',fontSize:'13px',marginBottom:'2px'}}>Je suis administrateur</div><div style={{fontSize:'11px',opacity:.8}}>Je configure le planning pour l'équipe (~5 min)</div></div>
        </button>
        <button className="btn" onClick={()=>setStep('reader')} style={{padding:'16px',borderRadius:'12px',background:'#f1f5f9',color:'#334155',textAlign:'left',display:'flex',alignItems:'center',gap:'12px',border:'1px solid #e2e8f0'}}>
          <div style={{width:'36px',height:'36px',borderRadius:'9px',background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}}>👁️</div>
          <div><div style={{fontWeight:'700',fontSize:'13px',marginBottom:'2px'}}>J'ai un code d'accès</div><div style={{fontSize:'11px',color:'#64748b'}}>Mon administrateur m'a communiqué un code</div></div>
        </button>
      </div>
    </Wrap>);

  if(step==='admin')return(
    <Wrap>
      <button className="btn" onClick={()=>{setStep('choice');setErr('')}} style={{background:'none',color:'#94a3b8',padding:'0 0 14px',fontSize:'12px'}}>← Retour</button>
      <div style={{fontSize:'17px',fontWeight:'700',color:'#0f172a',marginBottom:'4px'}}>⚙️ Configuration administrateur</div>
      <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'22px'}}>2 champs à remplir, puis cliquez Créer</div>
      <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
        <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
          <Num n={1}/>
          <div style={{flex:1}}>
            <div style={{fontSize:'13px',fontWeight:'600',color:'#0f172a',marginBottom:'5px'}}>Master Key JSONbin</div>
            <div style={{fontSize:'12px',color:'#64748b',lineHeight:'1.7',marginBottom:'8px'}}>
              Ouvrez <a href="https://jsonbin.io/register" target="_blank" style={{color:'#6366f1',fontWeight:'600'}}>jsonbin.io/register</a> → créez un compte gratuit → cliquez votre nom → <strong>API Keys</strong> → copiez la clé qui commence par <code style={{background:'#f1f5f9',padding:'1px 6px',borderRadius:'4px',fontSize:'11px'}}>$2a$10$…</code>
            </div>

          <div style={{flex:1}}>
            <div style={{fontSize:'13px',fontWeight:'600',color:'#0f172a',marginBottom:'5px'}}>Code PIN pour modifier le planning</div>
            <div style={{fontSize:'12px',color:'#64748b',lineHeight:'1.7',marginBottom:'8px'}}>4 à 6 chiffres. Partagez-le uniquement avec les 1–2 personnes autorisées à modifier.</div>
            <input type="password" style={{width:'160px',fontSize:'20px',fontFamily:'monospace',textAlign:'center',letterSpacing:'8px',padding:'10px'}} placeholder="••••" maxLength={8} value={pin} onChange={e=>setPin(e.target.value)}/>

      </div>
      {err&&<div style={{background:'#fff5f5',border:'1px solid #fecaca',borderRadius:'8px',padding:'10px',fontSize:'12px',color:'#dc2626',marginTop:'14px'}}>⚠️ {err}</div>}
      <button className="btn" onClick={goAdmin} disabled={busy} style={{width:'100%',marginTop:'20px',padding:'13px',borderRadius:'10px',background:busy?'#c7d2fe':'#4f46e5',color:'white',fontSize:'14px',fontWeight:'700'}}>
        {busy?<span className="pulse">⏳ Création…</span>:'🚀 Créer la base de données'}
      </button>
    </Wrap>);

  if(step==='reader')return(
    <Wrap>
      <button className="btn" onClick={()=>{setStep('choice');setErr('')}} style={{background:'none',color:'#94a3b8',padding:'0 0 14px',fontSize:'12px'}}>← Retour</button>
      <div style={{fontSize:'17px',fontWeight:'700',color:'#0f172a',marginBottom:'4px'}}>👁️ Accéder au planning</div>
      <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'20px'}}>Entrez le code communiqué par votre administrateur</div>
      <input style={{width:'100%',fontSize:'15px',fontFamily:'monospace',textAlign:'center',letterSpacing:'3px',padding:'12px'}} placeholder="Code d'accès…" value={code} onChange={e=>setCode(e.target.value)}/>
      {err&&<div style={{background:'#fff5f5',border:'1px solid #fecaca',borderRadius:'8px',padding:'10px',fontSize:'12px',color:'#dc2626',marginTop:'10px'}}>⚠️ {err}</div>}
      <button className="btn" onClick={goReader} disabled={busy} style={{width:'100%',marginTop:'14px',padding:'12px',borderRadius:'10px',background:busy?'#94a3b8':'#4f46e5',color:'white',fontSize:'14px',fontWeight:'700'}}>
        {busy?'Connexion…':'Accéder →'}
      </button>
    </Wrap>);

  return(
    <Wrap>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'10px'}}>✅</div>
        <div style={{fontSize:'20px',fontWeight:'700',color:'#15803d',marginBottom:'4px'}}>Base de données créée !</div>
        <div style={{fontSize:'13px',color:'#64748b',marginBottom:'24px'}}>Partagez ce code avec votre équipe (lecture seule).</div>
        <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'12px',padding:'16px',marginBottom:'16px',textAlign:'left'}}>
          <div style={{fontSize:'11px',fontWeight:'700',color:'#15803d',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'8px'}}>📤 Code d'accès</div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div style={{flex:1,background:'white',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px',fontFamily:'monospace',fontSize:'13px',color:'#0f172a',wordBreak:'break-all'}}>{binId}</div>
            <button className="btn" onClick={()=>navigator.clipboard?.writeText(binId)} style={{padding:'8px 12px',borderRadius:'8px',background:'#22c55e',color:'white',fontSize:'11px',fontWeight:'600',flexShrink:0}}>Copier</button>
          </div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'7px'}}>Vos collègues choisissent "J'ai un code d'accès" et collent ce code lors de leur première visite.</div>
        </div>
        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:'12px',padding:'14px',marginBottom:'20px',textAlign:'left'}}>
          <div style={{fontSize:'11px',fontWeight:'700',color:'#2563eb',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'5px'}}>✏️ Pour un 2ème éditeur</div>
          <div style={{fontSize:'12px',color:'#334155',lineHeight:'1.7'}}>Choisit "Je suis administrateur" → même Master Key + même PIN.</div>
        </div>
        <button className="btn" onClick={onDone} style={{width:'100%',padding:'13px',borderRadius:'10px',background:'#4f46e5',color:'white',fontSize:'14px',fontWeight:'700'}}>Ouvrir le planning →</button>
      </div>
    </Wrap>);
}

// ══ COMPOSANT : Modal PIN ══════════════════════════════════════════════════════
function PinModal({onClose,onSuccess}){
  const[pin, setPin]=useState('');
  const[mkey,setMkey]=useState('');
  const[err, setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const c=cfg.get();
  const needKey=!c.masterKey;
  const go=async()=>{
    if(pin!==c.pin){setErr('Code PIN incorrect');setTimeout(()=>setErr(''),1500);return}
    if(needKey){
      if(!mkey.trim()){setErr('Entrez votre Master Key');return}
      setBusy(true);
      try{await jRead(c.binId,mkey.trim());cfg.set({...c,masterKey:mkey.trim()});onSuccess()}
      catch{setErr('Master Key incorrecte')}
      setBusy(false);
    }else onSuccess();
  };
  return(<>
    <div className="ov" onClick={onClose}/>
    <div className="mb" style={{width:'min(340px,94vw)',background:'white',border:'1px solid #e2e8f0',padding:'28px 24px',textAlign:'center'}}>
      <div style={{fontSize:'28px',marginBottom:'8px'}}>🔐</div>
      <div style={{fontSize:'15px',fontWeight:'700',color:'#0f172a',marginBottom:'4px'}}>Mode édition</div>
      <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'18px',lineHeight:'1.6'}}>{needKey?'Saisissez votre Master Key et votre code PIN.':'Saisissez votre code PIN pour modifier le planning.'}</div>
      {needKey&&<div style={{marginBottom:'12px',textAlign:'left'}}>
        <div className="lbl">Master Key JSONbin</div>
        <input type="password" style={{width:'100%',fontFamily:'monospace',fontSize:'11px'}} placeholder="$2a$10$…" value={mkey} onChange={e=>setMkey(e.target.value)}/>
      </div>}
      <div style={{textAlign:'left',marginBottom:'14px'}}>
        <div className="lbl">Code PIN</div>
        <input type="password" autoFocus style={{width:'100%',fontFamily:'monospace',fontSize:'22px',textAlign:'center',letterSpacing:'10px',borderRadius:'9px',padding:'11px',border:`2px solid ${err?'#ef4444':'#e2e8f0'}`,animation:err?'shake .3s ease':''}} placeholder="••••" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
      </div>
      {err&&<div style={{fontSize:'12px',color:'#dc2626',marginBottom:'10px'}}>{err}</div>}
      <button className="btn" onClick={go} disabled={busy} style={{width:'100%',padding:'11px',borderRadius:'9px',background:'#4f46e5',color:'white',fontSize:'14px',fontWeight:'600',marginBottom:'8px'}}>{busy?'Vérification…':'Confirmer →'}</button>
      <button className="btn" onClick={onClose} style={{width:'100%',padding:'9px',borderRadius:'9px',background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0',fontSize:'13px'}}>Annuler</button>
    </div>
  </>);
}

// ══ APP PRINCIPALE ═════════════════════════════════════════════════════════════
function App(){
  const c=cfg.get();
  const[ready,    setReady]   =useState(!!c.binId);
  const[members,  setMembers] =useState(DEF_MEMBERS);
  const[schedule, setSched]   =useState(DEF_SCHED);
  const[weekData, setWeekData]=useState({});
  const[rotation, setRotation]=useState({rappel:{},opport:{}});
  const[monday,   setMonday]  =useState(()=>getMon(new Date()));
  const[isAdmin,  setIsAdmin] =useState(false);
  const[modal,    setModal]   =useState(null);
  const[panel,    setPanel]   =useState(null);
  const[showPin,  setShowPin] =useState(false);
  const[toast,    setToast]   =useState(null);
  const[syncSt,   setSyncSt]  =useState('idle');
  const[lastSync, setLastSync]=useState(null);
  const[inlineEdit,setInlineEdit]=useState(false);
  const[showAdd,  setShowAdd] =useState(false);
  const[showBrkForm,setShowBrkForm]=useState(false);
  // État ajout membre — dans App (pas dans callback, évite le bug hooks)
  const[nMName,  setNMName]  =useState('');
  const[nMColor, setNMColor] =useState(COLORS[0]);
  const[nMCanOpp,setNMCanOpp]=useState(true);
  const[nMEmail, setNMEmail] =useState('');

  const saveRef=useRef(null);
  const dataRef=useRef({members,schedule,weekData,rotation});
  useEffect(()=>{dataRef.current={members,schedule,weekData,rotation}},[members,schedule,weekData,rotation]);

  const toast_=useCallback((m,dur=3500)=>{setToast(m);setTimeout(()=>setToast(null),dur)},[]);

  // ── Sync JSONbin ──
  const loadData=useCallback(async(silent=false)=>{
    const cc=cfg.get();if(!cc.binId||!cc.masterKey)return;
    if(!silent)setSyncSt('loading');
    try{
      const d=await jRead(cc.binId,cc.masterKey);
      if(d.members)  setMembers(d.members);
      if(d.schedule) setSched(d.schedule);
      if(d.weekData) setWeekData(d.weekData);
      if(d.rotation) setRotation(d.rotation);
      setSyncSt('ok');setLastSync(new Date());
    }catch(e){setSyncSt('error');if(!silent)toast_('❌ '+e.message)}
  },[toast_]);

  const saveData=useCallback(async data=>{
    const cc=cfg.get();if(!cc.binId||!cc.masterKey)return;
    setSyncSt('saving');
    try{await jWrite(cc.binId,cc.masterKey,data);setSyncSt('ok');setLastSync(new Date())}
    catch{setSyncSt('error');toast_('❌ Sauvegarde échouée')}
  },[toast_]);

  const schedSave=useCallback(data=>{
    if(saveRef.current)clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>saveData(data),1500);
  },[saveData]);

  useEffect(()=>{if(ready)loadData()},[ready]);
  useEffect(()=>{const id=setInterval(()=>{if(!isAdmin)loadData(true)},120000);return()=>clearInterval(id)},[isAdmin,loadData]);
  const lastFocRef=useRef(0);
  useEffect(()=>{
    const h=()=>{const n=Date.now();if(ready&&n-lastFocRef.current>45000){lastFocRef.current=n;loadData(true)}};
    window.addEventListener('focus',h);return()=>window.removeEventListener('focus',h);
  },[loadData,ready]);

  const upd=(setter,key)=>v=>{setter(v);schedSave({...dataRef.current,[key]:v})};

  // ── Données semaine ──
  const wk=getMon(monday).toISOString().slice(0,10);
  const wd=weekData[wk]||{abs:{},rep:{},breaks:{}};
  const setWd=fn=>{const nv={...weekData,[wk]:fn(weekData[wk]||{abs:{},rep:{},breaks:{}})};upd(setWeekData,'weekData')(nv)};
  const isAbs=(p,d)=>!!(wd.abs[`${p}|${d}`]);
  const mMap=Object.fromEntries(members.map(m=>[m.name,m]));
  const mCol=n=>mMap[n]?.color||'#94a3b8';
  const getBreaks=id=>(wd.breaks||{})[id]||[];

  // ── Absences ──
  const toggleAbs=slot=>{
    if(!isAdmin)return;
    const key=`${slot.person}|${slot.day}`,was=wd.abs[key];
    setWd(w=>{const abs={...w.abs},rep={...w.rep};
      if(was){delete abs[key];schedule.filter(s=>s.person===slot.person&&s.day===slot.day).forEach(s=>delete rep[s.id])}
      else abs[key]=true;return{...w,abs,rep}});
    if(was)setModal(null);
  };

  // ── Remplacements session entière ──
  const confirmRep=(slotId,cand)=>{
    if(!isAdmin)return;
    const sl=schedule.find(s=>s.id===slotId);
    setWd(w=>({...w,rep:{...w.rep,[slotId]:cand}}));
    const nr={...rotation,[sl.type]:{...(rotation[sl.type]||{}),[cand]:{count:(rotation[sl.type]?.[cand]?.count||0)+1,last:Date.now()}}};
    upd(setRotation,'rotation')(nr);
    toast_(`✓ ${cand} assigné·e pour remplacer ${sl.person}`);
  };
  const removeRep=id=>setWd(w=>{const r={...w.rep};delete r[id];return{...w,rep:r}});

  // ── Pauses ponctuelles 20 min ──
  const addBreak=(slotId,brk)=>{
    const cur=getBreaks(slotId);
    setWd(w=>({...w,breaks:{...(w.breaks||{}),[slotId]:[...cur,brk]}}));
    toast_(`🔔 Pause ${tFmt(brk.startH)}–${tFmt(brk.endH)} attribuée à ${brk.rep}`);
  };
  const removeBreak=(slotId,brkId)=>setWd(w=>{
    const cur=getBreaks(slotId).filter(b=>b.id!==brkId);
    return{...w,breaks:{...(w.breaks||{}),[slotId]:cur}};
  });

  // ── Éligibles (session entière) ──
  const getElig=slot=>{
    const pool=slot.type==='opport'?members.filter(m=>m.canOpport).map(m=>m.name):members.map(m=>m.name);
    const af=Object.entries(wd.rep).filter(([id])=>schedule.find(s=>s.id===id)?.day===slot.day).map(([,p])=>p);
    const cands=pool.filter(c=>{
      if(c===slot.person||isAbs(c,slot.day)||af.includes(c))return false;
      if(schedule.some(s=>s.person===c&&s.day===slot.day))return false;
      return true;
    });
    const rs=rotation[slot.type]||{};
    return cands.sort((a,b)=>{const ca=rs[a]?.count||0,cb=rs[b]?.count||0;return ca!==cb?ca-cb:(rs[a]?.last||0)-(rs[b]?.last||0)});
  };

  // ── Notification : ICS + message Teams ──
  const notif=(slot,repName,startH,endH)=>{
    const sh=startH??slot.startH,eh=endH??slot.endH,date=wDates[slot.day];
    dlICS(makeICS(slot.person,slot.type,sh,eh,date),`phoning_${repName.replace(/\s/g,'_')}`);
    navigator.clipboard?.writeText(makeTeamsMsg(repName,slot.person,slot.day,sh,eh,slot.type,date));
    toast_('📅 Invitation téléchargée · 📋 Message Teams copié — collez-le dans votre canal',5000);
  };

  // ── Gestion créneaux ──
  const saveSlot=f=>{
    if(f.id)upd(setSched,'schedule')(schedule.map(s=>s.id===f.id?f:s));
    else upd(setSched,'schedule')([...schedule,{...f,id:uid()}]);
    setInlineEdit(false);setShowAdd(false);setModal(null);toast_('✓ Créneau sauvegardé');
  };
  const deleteSlot=id=>{upd(setSched,'schedule')(schedule.filter(s=>s.id!==id));setModal(null);setInlineEdit(false);toast_('Créneau supprimé')};

  // ── Gestion équipe ──
  const addMember=()=>{
    const n=nMName.trim();if(!n||mMap[n])return;
    upd(setMembers,'members')([...members,{name:n,color:nMColor,canOpport:nMCanOpp,email:nMEmail.trim()}]);
    setNMName('');setNMEmail('');setNMColor(COLORS[Math.floor(Math.random()*COLORS.length)]);
  };
  const rmMember=n=>upd(setMembers,'members')(members.filter(m=>m.name!==n));
  const updMember=(n,k,v)=>upd(setMembers,'members')(members.map(m=>m.name===n?{...m,[k]:v}:m));

  // ── Dérivés ──
  const wDates=Array.from({length:5},(_,i)=>addD(monday,i));
  const gridH=(H1-H0)*HPX;
  const mSlot=modal?schedule.find(s=>s.id===modal):null;
  const elig=mSlot?getElig(mSlot):[];
  const absByDay=Array.from({length:5},(_,d)=>schedule.filter(s=>s.day===d&&isAbs(s.person,d)).length);
  const totalAbs=Object.keys(wd.abs).length;
  const syncColor=syncSt==='saving'||syncSt==='loading'?'#6366f1':syncSt==='ok'?'#22c55e':syncSt==='error'?'#ef4444':'#cbd5e1';

  if(!ready)return<Wizard onDone={()=>{setReady(true);loadData()}}/>;

  return(
  <div style={{minHeight:'100vh',background:'#f8fafc'}}>

    {/* ── HEADER ── */}
    <div style={{background:'white',borderBottom:'1px solid #e2e8f0',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:'14px',fontWeight:'700',color:'#0f172a',display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
            📞 Planning Phoning
            <span style={{fontSize:'11px',fontWeight:'400',color:'#94a3b8'}}>· Linxea</span>
            <span style={{fontSize:'10px',fontWeight:'700',padding:'2px 7px',borderRadius:'5px',
              ...(isAdmin?{background:'#fef9c3',color:'#a16207',border:'1px solid #fde68a'}:{background:'#f1f5f9',color:'#94a3b8',border:'1px solid #e2e8f0'})}}>
              {isAdmin?'✏️ ÉDITION':'🔒 LECTURE'}
            </span>
            <span style={{fontSize:'10px',color:syncColor,fontWeight:'500'}}>
              {syncSt==='saving'&&<span className="pulse">● Sauvegarde…</span>}
              {syncSt==='loading'&&<span className="pulse">● Chargement…</span>}
              {syncSt==='ok'&&lastSync&&<span>● Sync {String(lastSync.getHours()).padStart(2,'0')}h{String(lastSync.getMinutes()).padStart(2,'0')}</span>}
              {syncSt==='error'&&<span>● Hors ligne</span>}
            </span>
          </div>
          <div style={{fontSize:'10px',color:'#94a3b8',marginTop:'1px'}}>
            {MFR[monday.getMonth()]} {monday.getFullYear()}
            {totalAbs>0&&<span style={{color:'#dc2626',fontWeight:'600',marginLeft:'6px'}}>· {totalAbs} absence{totalAbs>1?'s':''}</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'2px',background:'#f1f5f9',borderRadius:'8px',padding:'3px'}}>
          <button className="btn" onClick={()=>setMonday(d=>addD(d,-7))} style={{background:'transparent',color:'#64748b',padding:'4px 9px',borderRadius:'5px',fontSize:'13px'}}>←</button>
          <div style={{padding:'2px 8px',whiteSpace:'nowrap'}}>
            <span style={{fontSize:'10px',fontWeight:'700',color:'#6366f1',fontFamily:"'DM Mono',monospace"}}>S{isoW(monday)} </span>
            <span style={{fontSize:'11px',fontWeight:'600',color:'#334155'}}>{fmtS(monday)} → {fmtS(addD(monday,4))}</span>
          </div>
          <button className="btn" onClick={()=>setMonday(d=>addD(d,7))} style={{background:'transparent',color:'#64748b',padding:'4px 9px',borderRadius:'5px',fontSize:'13px'}}>→</button>
          <button className="btn" onClick={()=>setMonday(getMon(new Date()))} style={{background:'white',color:'#6366f1',border:'1px solid #e0e7ff',padding:'3px 7px',borderRadius:'5px',fontSize:'9px',fontWeight:'700',marginLeft:'2px'}}>AUJ</button>
        </div>
      </div>
      <div style={{display:'flex',gap:'5px',flexWrap:'wrap',alignItems:'center'}}>
        <button className="btn" onClick={()=>loadData()} title="Actualiser" style={{padding:'6px 10px',borderRadius:'7px',background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0',fontSize:'13px'}}>🔄</button>
        {isAdmin&&<button className="btn" onClick={()=>setPanel(p=>p==='team'?null:'team')} style={{padding:'6px 10px',borderRadius:'7px',fontSize:'13px',...(panel==='team'?{background:'#eff6ff',color:'#4f46e5',border:'1px solid #c7d2fe'}:{background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0'})}}>👥</button>}
        <button className="btn" onClick={()=>setPanel(p=>p==='stats'?null:'stats')} style={{padding:'6px 10px',borderRadius:'7px',fontSize:'13px',...(panel==='stats'?{background:'#eff6ff',color:'#4f46e5',border:'1px solid #c7d2fe'}:{background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0'})}}>📊</button>
        {isAdmin&&<button className="btn" onClick={()=>{setWd(()=>({abs:{},rep:{},breaks:{}}));setModal(null);toast_('Semaine réinitialisée')}} style={{padding:'6px 10px',borderRadius:'7px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca',fontSize:'11px'}}>↺</button>}
        {!isAdmin
          ?<button className="btn" onClick={()=>setShowPin(true)} style={{padding:'6px 13px',borderRadius:'7px',background:'#4f46e5',color:'white',fontSize:'12px',fontWeight:'600'}}>🔓 Se connecter</button>
          :<button className="btn" onClick={()=>{setIsAdmin(false);setPanel(null);toast_('🔒 Mode lecture')}} style={{padding:'6px 13px',borderRadius:'7px',background:'#f8fafc',color:'#64748b',border:'1px solid #e2e8f0',fontSize:'12px'}}>🔒 Verrouiller</button>
        }
      </div>
    </div>

    {/* ── PANNEAUX ── */}
    {panel&&(
    <div style={{margin:'10px 16px 0',background:'white',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'16px',maxHeight:'400px',overflowY:'auto'}}>
      {/* Équipe */}
      {panel==='team'&&isAdmin&&(<>
        <div style={{fontSize:'13px',fontWeight:'700',color:'#0f172a',marginBottom:'12px'}}>👥 Équipe</div>
        <div style={{display:'flex',flexDirection:'column',gap:'5px',marginBottom:'14px'}}>
          {members.map(m=>(
          <div key={m.name} style={{display:'flex',alignItems:'center',gap:'7px',padding:'7px 10px',background:'#f8fafc',border:'1px solid #f1f5f9',borderRadius:'8px',flexWrap:'wrap'}}>
            <div style={{width:'10px',height:'10px',borderRadius:'50%',background:m.color,flexShrink:0}}/>
            <span style={{fontWeight:'600',color:'#0f172a',fontSize:'13px',minWidth:'70px'}}>{m.name}</span>
            <button className="btn" onClick={()=>updMember(m.name,'canOpport',!m.canOpport)} style={{fontSize:'10px',padding:'2px 8px',borderRadius:'5px',...(m.canOpport?{background:'#fefce8',color:'#92400e',border:'1px solid #fde68a'}:{background:'#f1f5f9',color:'#94a3b8',border:'1px solid #e2e8f0'})}}>{m.canOpport?'⭐ Opport':'— Opport'}</button>
            <input style={{flex:1,minWidth:'130px'}} placeholder="email@linxea.com" value={m.email||''} onChange={e=>updMember(m.name,'email',e.target.value)}/>
            <button className="btn" onClick={()=>{if(window.confirm(`Supprimer ${m.name} ?`))rmMember(m.name)}} style={{padding:'3px 9px',borderRadius:'5px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca',fontSize:'10px'}}>Supprimer</button>
          </div>))}
        </div>
        {/* Ajout membre — hooks dans App (pas de bug) */}
        <div style={{background:'#f0f4ff',border:'1px dashed #c7d2fe',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'9px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#6366f1',textTransform:'uppercase',letterSpacing:'.5px'}}>+ Nouveau collaborateur</div>
          <div style={{display:'flex',gap:'7px',flexWrap:'wrap',alignItems:'center'}}>
            <input style={{minWidth:'110px'}} placeholder="Prénom *" value={nMName} onChange={e=>setNMName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()}/>
            <input style={{flex:1,minWidth:'140px'}} placeholder="email@linxea.com (optionnel)" value={nMEmail} onChange={e=>setNMEmail(e.target.value)}/>
            <div style={{display:'flex',gap:'3px'}}>{COLORS.slice(0,10).map(c=><button key={c} className="btn" onClick={()=>setNMColor(c)} style={{width:'22px',height:'22px',borderRadius:'50%',background:c,padding:0,border:nMColor===c?'2px solid #0f172a':'2px solid transparent'}}/>)}</div>
            <label style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'#64748b',cursor:'pointer'}}><input type="checkbox" checked={nMCanOpp} onChange={e=>setNMCanOpp(e.target.checked)}/>Opport</label>
            <button className="btn" onClick={addMember} style={{padding:'7px 14px',borderRadius:'7px',background:'#4f46e5',color:'white',fontSize:'12px',fontWeight:'600'}}>+ Ajouter</button>
          </div>
        </div>
      </>)}
      {/* Stats */}
      {panel==='stats'&&(<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
          <div style={{fontSize:'13px',fontWeight:'700',color:'#0f172a'}}>📊 Compteurs de remplacement</div>
          {isAdmin&&<button className="btn" onClick={()=>upd(setRotation,'rotation')({rappel:{},opport:{}})} style={{padding:'5px 10px',borderRadius:'6px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca',fontSize:'11px'}}>Réinitialiser</button>}
        </div>
        {['rappel','opport'].map(type=>(
        <div key={type} style={{marginBottom:'14px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'7px'}}>{type==='rappel'?'📞 Rappels':'⭐ Opportunités'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            {(type==='rappel'?members:members.filter(m=>m.canOpport)).sort((a,b)=>(rotation[type]?.[b.name]?.count||0)-(rotation[type]?.[a.name]?.count||0)).map(m=>{
              const cnt=rotation[type]?.[m.name]?.count||0,max=Math.max(...members.map(x=>rotation[type]?.[x.name]?.count||0),1);
              return(<div key={m.name} style={{display:'flex',alignItems:'center',gap:'8px',padding:'5px 8px',background:'#f8fafc',borderRadius:'6px'}}>
                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:m.color,flexShrink:0}}/>
                <span style={{fontSize:'12px',color:'#334155',flex:1}}>{m.name}</span>
                <div style={{flex:2,height:'5px',background:'#e2e8f0',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',width:`${(cnt/max)*100}%`,background:m.color,borderRadius:'3px',transition:'width .3s'}}/></div>
                <span style={{fontSize:'11px',fontWeight:'700',minWidth:'22px',textAlign:'right',color:cnt>0?m.color:'#cbd5e1'}}>{cnt}</span>
              </div>);
            })}
          </div>
        </div>))}
      </>)}
    </div>)}

    {/* ── LÉGENDE ── */}
    <div style={{padding:'8px 16px',display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
      <span className="tag tgr">📞 Rappel</span>
      <span className="tag tgo">⭐ Opport</span>
      <span style={{fontSize:'10px',fontWeight:'600',padding:'2px 7px',borderRadius:'5px',background:'#fff7ed',color:'#ea580c',border:'1px solid #fed7aa'}}>🔔 Pause 20 min</span>
      {!isAdmin&&<span style={{fontSize:'10px',color:'#94a3b8',marginLeft:'4px'}}>🔒 Mode lecture</span>}
      {isAdmin&&<span style={{fontSize:'10px',color:'#94a3b8',marginLeft:'4px'}}>Clic sur créneau → gérer absence & pauses</span>}
      {isAdmin&&<button className="btn" onClick={()=>{setShowAdd(v=>!v);setModal(null)}} style={{marginLeft:'auto',padding:'5px 12px',borderRadius:'7px',background:'#eff6ff',color:'#4f46e5',border:'1px solid #c7d2fe',fontSize:'11px',fontWeight:'600'}}>⊕ Ajouter un créneau</button>}
    </div>

    {/* Formulaire ajout créneau */}
    {showAdd&&isAdmin&&(
    <div style={{margin:'0 16px 10px'}}>
      <SlotForm slot={{day:0,person:members[0]?.name||'',startH:9,endH:13,type:'rappel',display:'',note:''}} members={members} isNew onSave={saveSlot} onDelete={()=>{}} onCancel={()=>setShowAdd(false)}/>
    </div>)}

    {/* ── CALENDRIER ── */}
    <div style={{padding:'0 16px 24px',overflowX:'auto'}}>
      <div style={{minWidth:'780px',background:'white',border:'1px solid #e2e8f0',borderRadius:'12px',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
        <div style={{display:'flex'}}>
          {/* Axe horaire */}
          <div style={{width:'36px',flexShrink:0,background:'#f8fafc',borderRight:'1px solid #f1f5f9'}}>
            <div style={{height:'52px',borderBottom:'1px solid #e2e8f0'}}/>
            <div style={{position:'relative',height:gridH}}>
              {Array.from({length:H1-H0+1},(_,i)=>(
                <div key={i} style={{position:'absolute',right:'5px',top:i*HPX-8,fontSize:'9px',color:'#cbd5e1',fontFamily:"'DM Mono',monospace",userSelect:'none',whiteSpace:'nowrap'}}>{H0+i}h</div>
              ))}
            </div>
          </div>
          {/* Colonnes */}
          {DAYS.map((dayName,dayIdx)=>{
            const date=wDates[dayIdx],isToday=date.toDateString()===new Date().toDateString();
            const laid=layoutDay(schedule.filter(s=>s.day===dayIdx)),nAbs=absByDay[dayIdx];
            return(
            <div key={dayIdx} style={{flex:1,minWidth:0,borderLeft:dayIdx>0?'1px solid #e2e8f0':'none',display:'flex',flexDirection:'column'}}>
              <div style={{height:'52px',padding:'7px 8px',borderBottom:'1px solid #e2e8f0',background:isToday?'#eff6ff':'#f8fafc',borderTop:isToday?'2px solid #6366f1':'2px solid transparent',flexShrink:0}}>
                <div style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.5px',color:isToday?'#4f46e5':'#94a3b8'}}>{dayName}</div>
                <div style={{display:'flex',alignItems:'center',gap:'4px',marginTop:'2px'}}>
                  <span style={{fontSize:'10px',color:'#94a3b8',fontFamily:"'DM Mono',monospace"}}>{fmtS(date)}</span>
                  {nAbs>0&&<span style={{fontSize:'9px',fontWeight:'700',padding:'1px 4px',borderRadius:'4px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca'}}>{nAbs} abs.</span>}
                </div>
              </div>
              <div style={{position:'relative',height:gridH,flex:1}}>
                {Array.from({length:H1-H0},(_,i)=><div key={i} style={{position:'absolute',left:0,right:0,top:i*HPX,height:'1px',background:'#f1f5f9'}}/>)}
                {Array.from({length:H1-H0},(_,i)=><div key={'h'+i} style={{position:'absolute',left:0,right:0,top:i*HPX+HPX/2,height:'1px',background:'#f8fafc'}}/>)}
                {laid.map(slot=>{
                  const absent=isAbs(slot.person,slot.day),rep=wd.rep[slot.id],isOpen=modal===slot.id,mc=mCol(slot.person),isR=slot.type==='rappel';
                  const brks=getBreaks(slot.id);
                  return(
                  <div key={slot.id} className="slot-o" style={{top:slot.top,height:slot.height,left:`${slot.leftPct}%`,width:`${slot.widthPct}%`,zIndex:isOpen?60:2}}
                    onClick={()=>{setModal(isOpen?null:slot.id);setInlineEdit(false);setShowBrkForm(false)}}>
                    <div className="slot-i" style={{
                      background:absent?`repeating-linear-gradient(135deg,#fff5f5 0,#fff5f5 4px,#fef2f2 4px,#fef2f2 8px)`:hexA(mc,.1),
                      borderLeftColor:absent?'#ef4444':isR?'#3b82f6':'#f59e0b',
                      boxShadow:isOpen?`0 0 0 2px ${mc} inset`:'0 1px 3px rgba(0,0,0,.05)',
                      opacity:absent?.78:1,
                    }}>
                      {/* Indicateurs pauses (bandeau coloré à droite) */}
                      {brks.map(brk=>{
                        const bTop=(brk.startH-slot.startH)*HPX,bH=(brk.endH-brk.startH)*HPX;
                        return(<div key={brk.id} style={{position:'absolute',right:0,top:bTop,height:bH,width:'5px',background:mCol(brk.rep),borderRadius:'0 7px 7px 0',opacity:.85,zIndex:3}}/>);
                      })}
                      <div style={{position:'absolute',top:'5px',right:'8px',width:'5px',height:'5px',borderRadius:'50%',background:isR?'#3b82f6':'#f59e0b',opacity:.7}}/>
                      <div style={{fontSize:'11px',fontWeight:'700',lineHeight:'1.3',color:absent?'#dc2626':mc,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{absent?'✕ ':''}{slot.person}</div>
                      {rep&&<div style={{fontSize:'10px',fontWeight:'600',lineHeight:'1.2',marginTop:'1px',color:mCol(rep),whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>↪ {rep}</div>}
                      <div style={{fontSize:'9px',color:'#94a3b8',fontFamily:"'DM Mono',monospace",lineHeight:'1.3',marginTop:'2px'}}>{slot.display||`${tFmt(slot.startH)}–${tFmt(slot.endH)}`}</div>
                      {slot.note&&slot.height>46&&<div style={{fontSize:'8.5px',color:'#94a3b8',marginTop:'1px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📅 {slot.note}</div>}
                      {brks.length>0&&<div style={{fontSize:'8.5px',color:'#ea580c',marginTop:'1px',fontWeight:'600'}}>🔔 {brks.length} pause{brks.length>1?'s':''}</div>}
                    </div>
                  </div>);
                })}
              </div>
            </div>);
          })}
        </div>
      </div>
    </div>

    {/* ── MODAL CRÉNEAU ── */}
    {mSlot&&(()=>{
      const absent=isAbs(mSlot.person,mSlot.day),rep=wd.rep[mSlot.id],mc=mCol(mSlot.person),isR=mSlot.type==='rappel',brks=getBreaks(mSlot.id);
      return(<>
        <div className="ov" onClick={()=>{setModal(null);setInlineEdit(false);setShowBrkForm(false)}}/>
        <div className="mb" style={{width:'min(460px,96vw)',maxHeight:'92vh',background:'white',border:'1px solid #e2e8f0',display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Header modal */}
          <div style={{padding:'14px 18px',background:'#f8fafc',borderBottom:'1px solid #e2e8f0',flexShrink:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'3px'}}>
                  <div style={{width:'10px',height:'10px',borderRadius:'50%',background:mc}}/>
                  <span style={{fontSize:'16px',fontWeight:'700',color:mc}}>{mSlot.person}</span>
                  {!isAdmin&&<span style={{fontSize:'10px',color:'#94a3b8',background:'#f1f5f9',padding:'2px 6px',borderRadius:'4px',border:'1px solid #e2e8f0'}}>lecture seule</span>}
                </div>
                <div style={{paddingLeft:'17px',display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                  <span style={{fontSize:'11px',color:'#94a3b8',fontFamily:"'DM Mono',monospace"}}>{DAYS[mSlot.day]} {fmtS(wDates[mSlot.day])} · {mSlot.display||`${tFmt(mSlot.startH)}–${tFmt(mSlot.endH)}`}</span>
                  <span className={isR?'tag tgr':'tag tgo'}>{isR?'📞 Rappel':'⭐ Opport'}</span>
                </div>
              </div>
              <button className="btn" onClick={()=>{setModal(null);setInlineEdit(false);setShowBrkForm(false)}} style={{background:'#f1f5f9',color:'#64748b',borderRadius:'7px',padding:'5px 9px',fontSize:'13px'}}>✕</button>
            </div>
          </div>

          {/* Body modal */}
          <div style={{padding:'14px 18px',overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:'10px'}}>

            {/* Mode lecture */}
            {!isAdmin&&(
            <div style={{padding:'14px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'9px',fontSize:'12px',color:'#64748b',textAlign:'center',lineHeight:'1.7'}}>
              🔒 Connectez-vous pour gérer les absences et remplacements.
              <br/><button className="btn" onClick={()=>{setModal(null);setShowPin(true)}} style={{marginTop:'8px',padding:'7px 16px',borderRadius:'7px',background:'#4f46e5',color:'white',fontSize:'12px',fontWeight:'600'}}>Se connecter →</button>
            </div>)}

            {/* Mode admin */}
            {isAdmin&&!inlineEdit&&(<>
              {/* Bouton absence */}
              <button className="btn" onClick={()=>toggleAbs(mSlot)} style={{display:'block',width:'100%',padding:'10px',borderRadius:'9px',fontSize:'13px',fontWeight:'600',textAlign:'center',
                ...(absent?{background:'#f0fdf4',color:'#15803d',border:'1px solid #bbf7d0'}:{background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca'})}}>
                {absent?'✓ Marquer présent·e ce jour':'✗ Marquer absent·e ce jour'}
              </button>

              {/* Remplaçant confirmé */}
              {absent&&rep&&(
              <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'9px',padding:'10px 12px',flexWrap:'wrap'}}>
                <div style={{width:'30px',height:'30px',borderRadius:'50%',background:mCol(rep),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:'700',color:'white',flexShrink:0}}>{rep[0]}</div>
                <div style={{flex:1}}><div style={{fontSize:'13px',fontWeight:'700',color:'#15803d'}}>{rep}</div><div style={{fontSize:'11px',color:'#86efac'}}>remplace <span style={{textDecoration:'line-through',color:'#94a3b8'}}>{mSlot.person}</span></div></div>
                <div style={{display:'flex',gap:'5px'}}>
                  <button className="btn" onClick={()=>notif(mSlot,rep,null,null)} style={{fontSize:'11px',padding:'5px 9px',borderRadius:'6px',fontWeight:'600',background:'#eff6ff',color:'#2563eb',border:'1px solid #bfdbfe'}}>📅 ICS + Teams</button>
                  <button className="btn" onClick={()=>removeRep(mSlot.id)} style={{fontSize:'11px',padding:'5px 9px',borderRadius:'6px',background:'white',border:'1px solid #e2e8f0',color:'#94a3b8'}}>Changer</button>
                </div>
              </div>)}

              {/* Liste remplaçants */}
              {absent&&elig.length>0&&(
              <div>
                <div style={{fontSize:'10px',fontWeight:'700',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'7px'}}>
                  {rep?'Modifier':'Choisir'} le remplaçant·e
                  <span style={{fontSize:'9px',color:'#e2e8f0',fontWeight:'400',textTransform:'none',letterSpacing:0,marginLeft:'5px'}}>— rotation équitable · même jour exclu</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                  {elig.map((c,i)=>{const cnt=rotation[mSlot.type]?.[c]?.count||0,isCur=rep===c,isTop=i===0&&!isCur,cc=mCol(c);return(
                  <button key={c} className="btn" onClick={()=>confirmRep(mSlot.id,c)}
                    style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:'9px',width:'100%',textAlign:'left',border:'1px solid',
                      ...(isCur?{background:'#f0fdf4',borderColor:'#bbf7d0'}:isTop?{background:'#eff6ff',borderColor:'#bfdbfe'}:{background:'#f8fafc',borderColor:'#f1f5f9'})}}>
                    <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                      <div style={{width:'28px',height:'28px',borderRadius:'50%',background:cc,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'700',color:'white',flexShrink:0}}>{c[0]}</div>
                      <div>
                        <div style={{fontWeight:'600',color:'#0f172a',fontSize:'13px',display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}}>
                          {c}
                          {isTop&&<span style={{background:'#dbeafe',color:'#1d4ed8',fontSize:'9px',fontWeight:'700',padding:'2px 5px',borderRadius:'4px'}}>SUGGÉRÉ·E</span>}
                          {isCur&&<span style={{background:'#dcfce7',color:'#15803d',fontSize:'9px',fontWeight:'700',padding:'2px 5px',borderRadius:'4px'}}>EN COURS</span>}
                        </div>
                        <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'1px'}}>{cnt===0?'Jamais remplacé·e':`${cnt} remplacement${cnt>1?'s':''}`}</div>
                      </div>
                    </div>
                    <span style={{fontSize:'14px',color:isCur?'#15803d':'#6366f1'}}>{isCur?'✓':'→'}</span>
                  </button>);})}
                </div>
              </div>)}

              {absent&&elig.length===0&&(
              <div style={{padding:'12px',background:'#fff5f5',border:'1px solid #fecaca',borderRadius:'8px',fontSize:'12px',color:'#dc2626',textAlign:'center'}}>
                ⚠ Aucun·e remplaçant·e disponible pour ce créneau
              </div>)}

              {/* ── PAUSES PONCTUELLES 20 MIN ── */}
              <div style={{borderTop:'1px solid #f1f5f9',paddingTop:'10px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                  <div style={{fontSize:'10px',fontWeight:'700',color:'#ea580c',textTransform:'uppercase',letterSpacing:'.6px'}}>🔔 Pauses ponctuelles · créneaux 20 min</div>
                  {!showBrkForm&&<button className="btn" onClick={()=>setShowBrkForm(true)} style={{fontSize:'10px',padding:'3px 9px',borderRadius:'6px',background:'#fff7ed',color:'#ea580c',border:'1px solid #fed7aa'}}>+ Ajouter</button>}
                </div>

                {/* Pauses existantes */}
                {brks.length===0&&!showBrkForm&&<div style={{fontSize:'11px',color:'#94a3b8',fontStyle:'italic'}}>Aucune pause planifiée</div>}
                {brks.map(brk=>(
                <div key={brk.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:'8px',marginBottom:'5px',flexWrap:'wrap'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'50%',background:mCol(brk.rep),flexShrink:0}}/>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:'11px',color:'#92400e',fontWeight:'600'}}>{tFmt(brk.startH)}–{tFmt(brk.endH)}</span>
                  <span style={{fontSize:'12px',color:'#334155',flex:1}}>↪ <strong>{brk.rep}</strong></span>
                  <button className="btn" onClick={()=>notif(mSlot,brk.rep,brk.startH,brk.endH)}
                    style={{fontSize:'10px',padding:'3px 8px',borderRadius:'5px',background:'#eff6ff',color:'#2563eb',border:'1px solid #bfdbfe'}}>
                    📅 ICS + Teams
                  </button>
                  <button className="btn" onClick={()=>removeBreak(mSlot.id,brk.id)}
                    style={{fontSize:'10px',padding:'3px 7px',borderRadius:'5px',background:'#fff5f5',color:'#dc2626',border:'1px solid #fecaca'}}>✕</button>
                </div>))}

                {/* Formulaire ajout pause */}
                {showBrkForm&&(
                <BreakForm slot={mSlot} members={members}
                  onAdd={brk=>{addBreak(mSlot.id,brk);setShowBrkForm(false)}}
                  onCancel={()=>setShowBrkForm(false)}/>)}
              </div>

              {/* Modifier créneau */}
              <div style={{borderTop:'1px solid #f1f5f9',paddingTop:'10px'}}>
                <button className="btn" onClick={()=>setInlineEdit(true)}
                  style={{width:'100%',padding:'9px',borderRadius:'8px',background:'#f8fafc',color:'#4f46e5',border:'1px solid #c7d2fe',fontSize:'12px',fontWeight:'600',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
                  ✎ Modifier les horaires / type de ce créneau
                </button>
              </div>
            </>)}

            {/* Éditeur inline */}
            {isAdmin&&inlineEdit&&(
            <SlotForm slot={mSlot} members={members} isNew={false} onSave={saveSlot} onDelete={()=>deleteSlot(mSlot.id)} onCancel={()=>setInlineEdit(false)}/>)}
          </div>
        </div>
      </>);
    })()}

    {/* ── MODAL PIN ── */}
    {showPin&&<PinModal onClose={()=>setShowPin(false)} onSuccess={()=>{setIsAdmin(true);setShowPin(false);toast_('✏️ Mode édition activé');loadData()}}/>}

    {/* ── TOAST ── */}
    {toast&&<div className="toast">{toast}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
